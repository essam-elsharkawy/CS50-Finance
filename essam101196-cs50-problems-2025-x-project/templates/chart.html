{% extends "layout.html" %}

{% block content %}
<h2>Expense Chart</h2>
<canvas id="expenseChart" width="400" height="200"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('expenseChart').getContext('2d');
    const data = {
        labels: {{ categories|tojson }},
        datasets: [{
            label: 'Expenses',
            data: {{ amounts|tojson }},
            backgroundColor: [
                'rgba(255, 99, 132, 0.7)',
                'rgba(54, 162, 235, 0.7)',
                'rgba(255, 206, 86, 0.7)',
                'rgba(75, 192, 192, 0.7)',
                'rgba(153, 102, 255, 0.7)',
                'rgba(255, 159, 64, 0.7)'
            ]
        }]
    };
    const config = {
        type: 'pie',
        data: data,
    };
    new Chart(ctx, config);
</script>
{% endblock %}
