{% extends "layout.html" %}

{% block content %}
<h2 class="mb-4">Add Expense</h2>

<form action="/add" method="post" class="row g-3 mb-4">
    <div class="col-md-3">
        <input type="number" step="0.01" class="form-control" name="amount" placeholder="Amount" required>
    </div>
    <div class="col-md-3">
        <input type="text" class="form-control" name="category" placeholder="Category" required>
    </div>
    <div class="col-md-4">
        <input type="text" class="form-control" name="note" placeholder="Note (optional)">
    </div>
    <div class="col-md-2">
        <button type="submit" class="btn btn-primary w-100">Add</button>
    </div>
</form>

<h3>Your Expenses</h3>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Amount</th>
            <th>Category</th>
            <th>Note</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        {% for expense in expenses %}
        <tr>
            <td>{{ expense[0] }}</td>
            <td>{{ expense[1] }}</td>
            <td>{{ expense[2] }}</td>
            <td>{{ expense[3] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
